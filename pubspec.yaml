name: tomato_deeplio
description: >-
  A production-ready Flutter plugin for App Links, Universal Links,
  Deep Links, Deferred Deep Links, and dynamic routing.
  A modern self-hosted replacement for Firebase Dynamic Links.
version: 1.0.0
homepage: https://github.com/ChaiwaT-Sun/tomato_deeplio
repository: https://github.com/ChaiwaT-Sun/tomato_deeplio
issue_tracker: https://github.com/ChaiwaT-Sun/tomato_deeplio/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: ts.sun.tomato_deeplio
        pluginClass: TomatoDeeplioPlugin
      ios:
        pluginClass: TomatoDeeplioPlugin
